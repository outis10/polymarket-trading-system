# =============================================================================
# POLYMARKET EVENTS CONFIGURATION
# =============================================================================
# Configure the events you want to monitor in the dashboard.
# Each event requires a name and token_id(s) from Polymarket.
#
# How to find token_id:
# 1. Go to the market on Polymarket
# 2. Open browser dev tools (F12) -> Network tab
# 3. Look for API calls to get order book
# 4. The token_id is in the URL or response
#
# Or use the Polymarket API to search markets by condition_id
# =============================================================================

events:
  # Example: Bitcoin Up/Down market
  - name: "Bitcoin Up or Down"
    description: "Will BTC price go up or down in the next hour?"
    icon: "btc"  # btc, eth, sol, generic
    condition_id: ""  # Fill with actual condition_id from Polymarket
    tokens:
      yes: ""  # Token ID for YES outcome
      no: ""   # Token ID for NO outcome
    # Optional: market-specific settings
    settings:
      refresh_interval: 5  # seconds
      price_to_beat: null  # optional reference price

  # Example: Ethereum market
  - name: "ETH Price Target"
    description: "Will ETH reach $4000 by end of month?"
    icon: "eth"
    condition_id: ""
    tokens:
      yes: ""
      no: ""
    settings:
      refresh_interval: 10

  # Example: SOL market
  - name: "SOL Daily Move"
    description: "Will SOL move 5% today?"
    icon: "sol"
    condition_id: ""
    tokens:
      yes: ""
      no: ""
    settings:
      refresh_interval: 5

# =============================================================================
# DEMO MODE
# =============================================================================
# When demo_mode is true, the app will use simulated data instead of
# connecting to Polymarket. Useful for testing the interface.
# =============================================================================

demo_mode: true

# Demo events with simulated data
demo_events:
  - name: "Bitcoin Up or Down"
    description: "January 26, 9-10AM ET"
    icon: "btc"
    initial_price: 88222.57
    price_to_beat: 87960.01
    yes_price: 0.52
    no_price: 0.48
    volatility: 0.02  # For price simulation

  - name: "ETH Above $3500"
    description: "By January 31, 2026"
    icon: "eth"
    initial_price: 3420.50
    price_to_beat: 3500.00
    yes_price: 0.45
    no_price: 0.55
    volatility: 0.015

  - name: "SOL Daily +5%"
    description: "January 26, 2026"
    icon: "sol"
    initial_price: 245.30
    price_to_beat: 257.57  # +5%
    yes_price: 0.38
    no_price: 0.62
    volatility: 0.025

# =============================================================================
# TRADING DEFAULTS
# =============================================================================

trading:
  default_shares: 10
  min_shares: 1
  max_shares: 10000
  default_limit_price: 0.50
  enable_market_orders: true
  enable_limit_orders: true

# =============================================================================
# UI SETTINGS
# =============================================================================

ui:
  theme: "dark"  # dark or light
  chart_height: 350
  refresh_rate_ms: 1000  # UI refresh rate
  max_price_history: 500  # Max data points to display
  show_countdown: true
  show_volume: true
