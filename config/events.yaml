demo_mode: false
live_discovery:
    enabled: true
    symbols:
        - BTC
        - ETH
        - SOL
        - XRP
    lookahead_days: 7
    refresh_seconds: 60
    max_events: 120
    require_15m: false
    allowed_timeframes:
        - 5
        - 15
        - 60
    only_live_now: true
    min_minutes: 10
    max_minutes: 20
live_pricing:
    source: chainlink
    chainlink_stream_url: ""
    chainlink_subscribe: {}
    chainlink_ping_interval: 20
